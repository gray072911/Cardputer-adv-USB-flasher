name: Build Cardputer ADV Flasher

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: "v5.5"

      - name: Clean old build
        run: |
          rm -rf build
          rm -rf managed_components
          rm -rf components
          rm -f dependencies.lock
          rm -f sdkconfig

      - name: Download M5GFX and M5Unified
        run: |
          mkdir -p components

          git clone \
            --depth 1 \
            https://github.com/m5stack/M5GFX.git \
            components/m5gfx

          git clone \
            --depth 1 \
            https://github.com/m5stack/M5Unified.git \
            components/M5Unified

          echo "Downloaded local M5 components"

          ls -la components
          ls -la components/m5gfx
          ls -la components/M5Unified

      - name: Set ESP32-S3 target
        run: |
          idf.py set-target esp32s3 2>&1 | tee set-target.log

      - name: Build firmware
        id: build_firmware
        continue-on-error: true
        run: |
          set -o pipefail
          idf.py build 2>&1 | tee build.log

      - name: Extract build errors
        if: always()
        run: |
          {
            echo "========================================"
            echo "CARDPUTER ADV BUILD ERROR REPORT"
            echo "========================================"
            echo
            echo "----- COMPILER ERRORS -----"

            grep -n -i -B 10 -A 30 \
              -E "error:|fatal error:|undefined reference|FAILED:|CMake Error" \
              build.log || true

            echo
            echo "----- ESP-IDF STDERR LOGS -----"

            if [ -d build/log ]; then
              for file in build/log/idf_py_stderr_output_*; do
                if [ -f "$file" ]; then
                  echo
                  echo "===== $file ====="
                  cat "$file"
                fi
              done
            fi

            echo
            echo "----- LAST 300 BUILD LINES -----"

            tail -n 300 build.log || true
          } > BUILD_ERRORS.txt

      - name: Package firmware
        if: steps.build_firmware.outcome == 'success'
        run: |
          mkdir -p firmware

          cp build/*.bin firmware/ 2>/dev/null || true
          cp build/*.elf firmware/ 2>/dev/null || true
          cp build/flash_args firmware/ 2>/dev/null || true
          cp build/flasher_args.json firmware/ 2>/dev/null || true
          cp build/bootloader/*.bin firmware/ 2>/dev/null || true
          cp build/partition_table/*.bin firmware/ 2>/dev/null || true

      - name: Upload firmware
        if: steps.build_firmware.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cardputer-adv-flasher
          path: firmware/

      - name: Upload error report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BUILD-ERROR-REPORT
          path: BUILD_ERRORS.txt

      - name: Upload complete logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: COMPLETE-BUILD-LOGS
          path: |
            build.log
            set-target.log
            build/log/
          if-no-files-found: warn

      - name: Fail workflow if build failed
        if: steps.build_firmware.outcome == 'failure'
        run: |
          echo "Firmware build failed."
          echo "Download BUILD-ERROR-REPORT."
          exit 1
